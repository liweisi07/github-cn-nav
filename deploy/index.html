<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="preload" href="projects.json" as="fetch" crossorigin="anonymous">
<title>GitHub 5000+ Star 项目中文导航</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f172a;color:#e2e8f0;padding:24px;max-width:1600px;margin:0 auto;font-size:17px}
.header{text-align:center;padding:32px 0 20px;border-bottom:1px solid #1e293b;margin-bottom:24px}
.header h1{font-size:34px;background:linear-gradient(135deg,#60a5fa,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header p{color:#64748b;margin-top:8px;font-size:16px}
.stats{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;margin:16px 0}
.stat-item{background:#1e293b;border-radius:10px;padding:12px 24px;text-align:center;min-width:100px}
.stat-item .num{font-size:30px;font-weight:700;color:#60a5fa}
.stat-item .label{color:#94a3b8;font-size:17px;margin-top:2px}
.search-bar{margin:20px 0;display:flex;gap:10px}
.search-bar input{flex:1;min-width:200px;padding:11px 16px;border-radius:8px;border:1px solid #334155;background:#1e293b;color:#e2e8f0;font-size:16px;outline:none;transition:.2s}
.search-bar input:focus{border-color:#60a5fa;box-shadow:0 0 0 3px rgba(96,165,250,.2)}
.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:8px;margin-bottom:28px}
.cat-card{background:#1e293b;border-radius:10px;padding:18px 22px;cursor:pointer;transition:.15s;border:1px solid transparent;user-select:none}
.cat-card:hover,.cat-card.active{border-color:#60a5fa;background:#1e3a5f}
.new-cat{border:1px solid rgba(245,158,11,.3);background:linear-gradient(135deg,#1e293b,#2d1a0a)}
.cat-card .cat-name{font-size:18px;font-weight:600}
.cat-card .cat-count{font-size:15px;color:#64748b;margin-top:2px}
.cat-card .cat-bar{height:3px;border-radius:2px;margin-top:6px;transition:.3s}
.project-area{margin-bottom:24px}
.project-area h2{font-size:20px;padding:12px 0;display:flex;align-items:center;gap:8px;border-bottom:1px solid #1e293b;margin-bottom:10px;position:sticky;top:0;background:#0f172a;z-index:10}
.project-item{padding:14px 18px;border-radius:6px;transition:.12s;border-bottom:1px solid #1e293b;cursor:pointer}
.project-item:hover{background:#1e293b}
.project-top{display:flex;align-items:center;gap:10px}
.project-top .rank{color:#64748b;font-size:16px;min-width:28px;text-align:right}
.rh-badge{background:#8b5cf6;color:#fff;border-radius:4px;padding:2px 9px;font-size:15px;cursor:pointer;white-space:nowrap;flex-shrink:0;font-weight:600;animation:rh-pulse 3s ease-in-out infinite}
.rh-badge:hover{background:#7c3aed;animation:none}
@keyframes rh-pulse{0%,100%{box-shadow:0 0 0 0 rgba(139,92,246,.4)}50%{box-shadow:0 0 6px 2px rgba(139,92,246,.25)}}
.project-top .name{font-weight:600;color:#60a5fa;text-decoration:none;font-size:18px;min-width:200px;max-width:380px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.project-top .name:hover{text-decoration:underline}
.project-top .desc{flex:1;color:#94a3b8;font-size:16px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.project-top .stars{color:#f59e0b;font-size:16px;min-width:70px;text-align:right;font-variant-numeric:tabular-nums}
.project-top .lang{font-size:15px;color:#64748b;min-width:80px;text-align:right}
.rh-panel{display:none;background:linear-gradient(135deg,#1a2332 0%,#162032 100%);border-radius:8px;padding:22px 26px;margin:12px 0 8px 48px;border-left:4px solid #8b5cf6;font-size:17px;line-height:1.8;max-width:110ch;box-shadow:0 2px 12px rgba(0,0,0,.3)}
.rh-panel.open{display:block}
.rh-panel .rh-section{display:flex;gap:10px;align-items:flex-start;margin-bottom:10px}
.rh-panel .rh-section:last-child{margin-bottom:0}
.rh-panel .rh-icon{flex-shrink:0;width:22px;text-align:center;font-size:17px;margin-top:1px}
.rh-panel .rh-label{color:#8b5cf6;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
.rh-panel .rh-one{color:#fbbf24;font-weight:700;font-size:20px;line-height:1.5;padding-bottom:8px;border-bottom:1px solid rgba(139,92,246,.2);margin-bottom:10px}
.rh-panel .rh-plain{color:#cbd5e1;line-height:1.7}
.rh-panel .rh-ana{color:#94a3b8;line-height:1.6;font-style:italic}
.rh-panel .rh-aud{color:#94a3b8;line-height:1.6}
.skeleton{height:120px;background:linear-gradient(90deg,#1e293b 25%,#263348 50%,#1e293b 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:6px;margin:8px 0}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.item-enter{animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.footer{text-align:center;padding:24px;color:#475569;font-size:15px}
.loading{text-align:center;padding:40px;color:#64748b}
.loading::after{content:'...';animation:dots 1.5s steps(4,end) infinite}
@keyframes dots{0%{content:'.'}33%{content:'..'}66%{content:'...'}}
.spinner{display:inline-block;width:24px;height:24px;border:3px solid #1e293b;border-top-color:#60a5fa;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-state{padding:20px;color:#64748b;text-align:center}
.error-state{padding:20px;color:#ef4444;text-align:center;cursor:pointer}
.error-state:hover{text-decoration:underline}
@media(max-width:768px){.project-top{flex-wrap:wrap;gap:4px}.project-top .desc{min-width:100%;order:5}.project-top .stars{order:3}.project-top .lang{order:4}}
</style></head><body>
<div class="header"><h1>⭐ GitHub 5000+ Star 项目中文导航</h1>
<p>6788 个开源项目 · 22 个分类 · 含人话解读</p></div>
<div class="stats">
<div class="stat-item"><div class="num">6788</div><div class="label">总项目</div></div>
<div class="stat-item"><div class="num">22</div><div class="label">分类</div></div>
<div class="stat-item"><div class="num">6752</div><div class="label">人话解读</div></div>
</div>
<div class="search-bar"><input id="search" placeholder="🔍 搜索项目名、描述、人话解读..."></div>
<div class="cat-grid" id="catGrid">
  <div style="grid-column:1/-1;text-align:center;padding:20px;color:#64748b">
    <div class="spinner"></div><br>加载项目数据中...
  </div>
</div>
<div class="project-area" id="projectArea"></div>
<div class="footer">Generated 2026-05-19 · Hermes Agent · 6788 repos · 6752 条人话解读</div>
<script>
// ============ DATA LOADER ============
let allProjects = [];
let catMap = {};
let totalProjects = 0;
let totalCats = 0;
let activeCat = '';
let currentFilter = '';
let observer = null;
let renderBatch = 0;
const BATCH_SIZE = 30;

let dataState = 'loading'; // loading | ready | error

async function loadData() {
  const grid = document.getElementById('catGrid');
  const area = document.getElementById('projectArea');
  
  try {
    const resp = await fetch('projects.json');
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    allProjects = await resp.json();
    // Normalize rh: convert structured object to flat string (supports both long & short keys)
    allProjects.forEach(p => {
      if (p.rh && typeof p.rh === 'object') {
        const parts = [];
        const o = p.rh.one_liner || p.rh.o || '';
        const pl = p.rh.plain || p.rh.p || '';
        const an = p.rh.analogy || p.rh.a || '';
        const au = p.rh.audience || p.rh.u || '';
        if (o) parts.push(o);
        if (pl) parts.push(pl);
        if (an) parts.push('类比：' + an);
        if (au) parts.push('适合：' + au);
        p.rh = parts.join(' ');
      }
    });
    dataState = 'ready';
    totalProjects = allProjects.length;
    
    // Build category map
    catMap = {};
    allProjects.forEach(p => {
      if (!catMap[p.cat]) catMap[p.cat] = [];
      catMap[p.cat].push(p);
    });
    totalCats = Object.keys(catMap).length;
    
    // Build "新上" virtual categories based on first_seen date
    const now = new Date();
    const weekAgo = new Date(now - 7*86400000).toISOString().slice(0,10);
    const monthAgo = new Date(now - 30*86400000).toISOString().slice(0,10);
    const halfAgo = new Date(now - 180*86400000).toISOString().slice(0,10);
    
    catMap['_new_week'] = allProjects.filter(p => p.first_seen >= weekAgo).sort((a,b) => b.first_seen.localeCompare(a.first_seen));
    catMap['_new_month'] = allProjects.filter(p => p.first_seen >= monthAgo && p.first_seen < weekAgo).sort((a,b) => b.first_seen.localeCompare(a.first_seen));
    catMap['_new_half'] = allProjects.filter(p => p.first_seen >= halfAgo && p.first_seen < monthAgo).sort((a,b) => b.first_seen.localeCompare(a.first_seen));
    
    // 近5日飙升: 基于 GH Archive 真实 star 增量数据
    try {
      const surgeResp = await fetch('surge_top100.json');
      if (surgeResp.ok) {
        const surgeData = await surgeResp.json();
        // Build lookup: repo name → surge count
        const surgeMap = {};
        surgeData.forEach(s => { surgeMap[s.repo.toLowerCase()] = s.surge_5d; });
        // Find matching projects and add surge field
        catMap['_trending'] = [];
        allProjects.forEach(p => {
          const repo = (p.url || '').replace(/^https?:\/\/github\.com\//i, '').toLowerCase();
          const delta = surgeMap[repo];
          if (delta) {
            p.surge_5d = delta;
            catMap['_trending'].push(p);
          }
        });
        // Sort by surge delta descending
        catMap['_trending'].sort((a,b) => b.surge_5d - a.surge_5d);
      }
    } catch(e) {
      console.warn('surge_top100.json load failed, trending disabled:', e.message);
      catMap['_trending'] = [];
    }
    
    // Render category grid
        renderCatGrid();
    area.innerHTML = '<div class="loading-state">点击上方分类开始浏览</div>';
  } catch(e) {
    dataState = 'error';
    grid.innerHTML = '<div class="error-state" onclick="location.reload()">⚠️ 数据加载失败（' + e.message + '）<br><small>点击重试</small></div>';
    area.innerHTML = '';
    console.error(e);
  }
}

// ============ CATEGORY GRID ============
const CAT_COLORS = {"_trending": "#22c55e", "_new_week": "#f59e0b", "_new_month": "#f97316", "_new_half": "#ef4444", "API-工具-命令行": "#3b82f6", "前端-UI框架": "#8b5cf6", "后端-框架-API": "#06b6d4", "操作系统-底层-内核": "#ef4444", "开发工具-编辑器-IDE": "#f59e0b", "学习资源-教程-书籍": "#10b981", "大语言模型-LLM": "#6366f1", "AI应用-Agent": "#8b5cf6", "移动开发-Android-iOS": "#22c55e", "数据科学-数据库": "#14b8a6", "AI-机器学习": "#a855f7", "自动化-DevOps-部署": "#0ea5e9", "媒体-音视频-直播": "#ec4899", "安全-网络-代理": "#dc2626", "游戏-娱乐": "#eab308", "其他": "#6b7280", "内容创作-AIGC-设计": "#f97316", "编程语言-编译器": "#84cc16", "建站-电商-CMS": "#06b6d4", "区块链-Web3": "#f59e0b", "爬虫-数据采集": "#14b8a6", "量化交易-金融": "#10b981"};
const NEW_LABELS = {"_trending": "🔥 近5日飙升", "_new_week": "🆕 一周新上", "_new_month": "🆕 一月新上", "_new_half": "🆕 半年新上"};
const EMOJI_MAP = {"大语言": "🤖", "AI应用": "⚡", "AI-机": "🧠", "内容创作": "🎨", "前端": "🖥️", "后端": "⚙️", "编程语言": "📜", "操作系统": "💻", "开发工具": "🛠️", "API": "🔧", "数据科学": "🗄️", "安全": "🔒", "区块链": "⛓️", "量化": "💰", "移动": "📱", "自动化": "🔄", "学习资源": "📚", "建站": "🌐", "游戏": "🎮", "爬虫": "🕷️", "媒体": "🎬", "其他": "📌"};

function emojiFor(cat) {
  for (let [k,v] of Object.entries(EMOJI_MAP)) {
    if (cat.startsWith(k)) return v;
  }
  return '📌';
}

function renderCatGrid() {
  const grid = document.getElementById('catGrid');
  const entries = Object.entries(catMap);
  // Sort: new categories first, then by count
  const cats = entries.sort((a,b) => {
    const aNew = a[0].startsWith('_');
    const bNew = b[0].startsWith('_');
    if (aNew && !bNew) return 1;
    if (!aNew && bNew) return -1;
    if (aNew && bNew) {
      const order = {'_new_week':0,'_new_month':1,'_new_half':2,'_trending':3};
      return (order[a[0]]||9) - (order[b[0]]||9);
    }
    return b[1].length - a[1].length;
  });
  const maxCnt = Math.max(...cats.map(([,items]) => items.length), 1);
  grid.innerHTML = cats.map(([cat, items]) => {
    const label = NEW_LABELS[cat] || (emojiFor(cat) + ' ' + escHtml(cat));
    const color = CAT_COLORS[cat] || '#6b7280';
    const pct = Math.round(items.length / maxCnt * 100);
    const isNew = cat.startsWith('_');
    return `<div class="cat-card${isNew ? ' new-cat' : ''}" data-cat="${escHtml(cat)}">
      <div class="cat-name">${label}</div>
      <div class="cat-count">${items.length} 个项目</div>
      <div class="cat-bar" style="width:${pct}%;background:${color}"></div>
    </div>`;
  }).join('');
  
  // Attach click handlers via event delegation (safer than inline onclick)
  grid.addEventListener('click', function(e) {
    const card = e.target.closest('.cat-card');
    if (card && card.dataset.cat) {
      openCat(card.dataset.cat);
    }
  });
  
  // Update header stats
  document.querySelector('.header p').textContent = totalProjects + ' 个开源项目 · ' + totalCats + ' 个分类 · 含人话解读';
}

// ============ OPEN CATEGORY ============
function openCat(cat) {
  if (dataState !== 'ready') return;
  activeCat = cat;
  currentFilter = '';
  document.getElementById('search').value = '';
  
  // Highlight active category card
  document.querySelectorAll('.cat-card').forEach(c => c.classList.toggle('active', c.dataset.cat === cat));
  
  const items = catMap[cat] || [];
  const area = document.getElementById('projectArea');
  area.innerHTML = `<h2>${emojiFor(cat)} ${escHtml(cat)} <span style="font-size:15px;color:#64748b">(${items.length}个)</span></h2>
    <div id="itemContainer"></div>`;
  
  renderBatch = 0;
  renderNextBatch(items);
}

// ============ RENDER BATCH ============
function renderNextBatch(items) {
  const container = document.getElementById('itemContainer');
  if (!container) return;
  
  const start = renderBatch * BATCH_SIZE;
  const end = Math.min(start + BATCH_SIZE, items.length);
  
  for (let i = start; i < end; i++) {
    container.appendChild(createProjectItem(items[i]));
  }
  renderBatch++;
  
  if (end < items.length) {
    // Set up sentinel for next batch
    const sentinel = document.createElement('div');
    sentinel.id = 'sentinel-' + renderBatch;
    sentinel.style.height = '1px';
    container.appendChild(sentinel);
    
    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          io.unobserve(e.target);
          e.target.remove();
          setTimeout(() => renderNextBatch(items), 50);
        }
      });
    }, { rootMargin: '400px' });
    io.observe(sentinel);
  }
}

// ============ CREATE PROJECT ITEM ============
function createProjectItem(p) {
  const div = document.createElement('div');
  div.className = 'project-item item-enter';
  div.dataset.name = p.name;
  div.dataset.cat = p.cat;
  div.dataset.desc = p.desc;
  div.dataset.rh = p.rh || '';
  
  const starsStr = p.stars >= 1000 ? '⭐ ' + (p.stars/1000).toFixed(1) + 'k' : '⭐ ' + p.stars.toLocaleString();
  const surgeBadge = p.surge_5d ? ' <span style="color:#22c55e;font-weight:700;font-size:15px" title="近5日新增' + p.surge_5d + ' ⭐">↑' + p.surge_5d + '</span>' : '';
  
  div.innerHTML = `<div class="project-top">
    <span class="rank">${p.id}</span>
    ${p.rh ? '<span class="rh-badge" title="点击看大白话解读">人话</span>' : ''}
    <a class="name" href="${escHtml(p.url)}" target="_blank">${escHtml(p.name)}</a>
    <span class="desc">${escHtml(p.desc)}</span>
    <span class="stars">${starsStr}${surgeBadge}</span>
    <span class="lang">${escHtml(p.lang)}</span>
  </div>`;
  
  // Click handler for rh-panel
  if (p.rh) {
    div.addEventListener('click', function(e) {
      if (e.target.tagName === 'A') return;
      toggleRhPanel(this, p.rh);
    });
  }
  
  return div;
}

// ============ RENHUA PANEL ============
function toggleRhPanel(itemEl, rhText) {
  let panel = itemEl.querySelector('.rh-panel');
  if (panel) {
    panel.classList.toggle('open');
  } else {
    panel = document.createElement('div');
    panel.className = 'rh-panel open';
    panel.innerHTML = parseRhText(rhText);
    itemEl.appendChild(panel);
  }
}

function parseRhText(text) {
  if (!text) return '';
  let html = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  
  const parts = html.split(/(类比：|适合：|解决)/);
  let result = '';
  let firstLine = true;
  let label = '';
  
  for (let i = 0; i < parts.length; i++) {
    const p = parts[i].trim();
    if (!p) continue;
    if (p === '类比：') { label = 'ana'; continue; }
    if (p === '适合：') { label = 'aud'; continue; }
    if (p === '解决') { label = 'solve'; continue; }
    
    if (firstLine) {
      result += '<div class="rh-one">💡 ' + p + '</div>';
      firstLine = false;
    } else if (label === 'ana') {
      result += '<div class="rh-section"><span class="rh-icon">🔄</span><div><div class="rh-label">类比</div><div class="rh-ana">' + p + '</div></div></div>';
      label = '';
    } else if (label === 'aud') {
      result += '<div class="rh-section"><span class="rh-icon">👤</span><div><div class="rh-label">适合谁</div><div class="rh-aud">' + p + '</div></div></div>';
      label = '';
    } else if (label === 'solve') {
      result += '<div class="rh-section"><span class="rh-icon">🎯</span><div><div class="rh-label">解决</div><div class="rh-aud">' + p + '</div></div></div>';
      label = '';
    } else {
      result += '<div class="rh-section"><span class="rh-icon">📖</span><div class="rh-plain">' + p + '</div></div>';
    }
  }
  return result;
}

// ============ SEARCH ============
let searchTimer = null;
document.getElementById('search').addEventListener('input', function() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => doSearch(this.value.trim().toLowerCase()), 150);
});

function doSearch(q) {
  if (dataState !== 'ready') return;
  currentFilter = q;
  
  if (!q) {
    // Empty search - show all categories
    document.querySelectorAll('.cat-card').forEach(c => c.classList.remove('active'));
    document.getElementById('projectArea').innerHTML = '<div style="text-align:center;padding:40px;color:#64748b">点击上方分类开始浏览</div>';
    activeCat = '';
    return;
  }
  
  // Search across all projects
  const results = allProjects.filter(p => {
    return p.name.toLowerCase().includes(q) ||
           p.desc.toLowerCase().includes(q) ||
           (p.rh && p.rh.toLowerCase().includes(q));
  });
  
  const area = document.getElementById('projectArea');
  if (results.length === 0) {
    area.innerHTML = `<div style="text-align:center;padding:40px;color:#64748b">未找到匹配 "${escHtml(q)}" 的项目</div>`;
    return;
  }
  
  area.innerHTML = `<h2>🔍 搜索: "${escHtml(q)}" <span style="font-size:15px;color:#64748b">(${results.length}个结果)</span></h2>
    <div id="itemContainer"></div>`;
  
  renderBatch = 0;
  // Show all search results in batches
  renderNextBatch(results.slice(0, 200));  // Cap at 200 for search
}

// ============ HELPERS ============
function escHtml(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ============ INIT ============
loadData();
</script>
</body></html>
