name: Auto Update (Every 2 Days)

on:
  schedule:
    - cron: '0 8 */2 * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: '干跑模式（不实际修改数据）'
        type: boolean
        default: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 计算近5日飙升
        run: python3 compute_surge.py --days 5 --top 100 --workers 20

      - name: 运行更新
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python3 auto_update.py --dry-run
          else
            python3 auto_update.py
          fi

      - name: 重新生成部署包
        run: |
          cp surge_top100.json deploy/
          python3 deploy.py

      - name: 提交变更
        # 仅当非 dry_run 时执行
        if: ${{ (github.event_name != 'workflow_dispatch') || (github.event.inputs.dry_run != 'true') }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json 人话解读.json projects.json translate_batch_*_done.json deploy/ surge_top100.json 分类统计.json classify_module.py
          git diff --staged --quiet || (
            git commit -m "🤖 auto-update: $(date +%Y-%m-%d)" &&
            git push
          )

  deploy-pages:
    needs: update
    if: ${{ (github.event_name != 'workflow_dispatch') || (github.event.inputs.dry_run != 'true') }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: 检出 main 分支
        uses: actions/checkout@v4

      - name: 部署到 GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
          publish_branch: gh-pages
          force_orphan: true
          commit_message: "🤖 deploy: ${{ github.event.head_commit.message || 'auto' }}"
