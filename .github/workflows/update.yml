name: Auto Update (Daily)

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: '干跑模式（不实际修改数据）'
        type: boolean
        default: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 计算近5日飙升 (GH Archive)
        run: python3 src/compute_surge.py --days 5 --top 100 --workers 10

      - name: 影子快照 (新方案引导, GitHub API)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 src/compute_surge_v2.py --shadow --max-calls 900 || echo "⚠️ 影子快照失败（非阻塞）"

      - name: 运行更新
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python3 src/auto_update.py --dry-run
          else
            python3 src/auto_update.py
          fi

      - name: 重新生成部署包
        run: |
          cp data/surge_top100.json deploy/
          python3 src/deploy.py

      - name: 提交变更
        # 仅当非 dry_run 时执行
        if: ${{ (github.event_name != 'workflow_dispatch') || (github.event.inputs.dry_run != 'true') }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/manifest.json data/人话解读.json data/projects.json data/surge_top100.json data/分类统计.json data/snapshots/ src/classify_module.py deploy/
          git diff --staged --quiet || (
            git commit -m "🤖 auto-update: $(date +%Y-%m-%d)" &&
            git push
          )

  deploy-pages:
    needs: update
    if: ${{ (github.event_name != 'workflow_dispatch') || (github.event.inputs.dry_run != 'true') }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: 检出 main 分支
        uses: actions/checkout@v4

      - name: 部署到 GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
          publish_branch: gh-pages
          force_orphan: true
          commit_message: "🤖 deploy: ${{ github.event.head_commit.message || 'auto' }}"
